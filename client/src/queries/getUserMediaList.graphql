# Keep in sync with shared/queries/mediaList.ts (runtime copy of this query).
# Deliberately slim: only fields the home and calendar views render. The show
# page fetches full media details separately via GetMedia.
fragment EntyFragment on MediaList {
  id
  status
  progress
  media {
    id
    title {
      romaji
      english
      native
    }
    coverImage {
      large
      extraLarge
    }
    status
    episodes
    nextAiringEpisode {
      airingAt
      episode
    }
    genres
    tags {
      name
      category
    }
    studios {
      nodes {
        id
        name
      }
    }
  }
}

query GetUserMediaList($userId: Int!, $status: [MediaListStatus]) {
  MediaListCollection(userId: $userId, type: ANIME, status_in: $status) {
    lists {
      entries {
        ...EntyFragment
      }
    }
  }
}
