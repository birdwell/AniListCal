schema: "https://graphql.anilist.co"
documents: "client/**/*.graphql"
generates:
  client/src/generated/types.ts:
    plugins:
      - typescript
    config:
      avoidOptionals: true
      skipTypename: true
      useTypeImports: true
      scalars:
        Int: number
        Float: number
        String: string
        Boolean: boolean
        ID: string
        CountryCode: string
  client/src/generated/operations.ts:
    plugins:
      - typescript-operations
    config:
      avoidOptionals: true
      skipTypename: true
      useTypeImports: true
      importSchemaTypesFrom: client/src/generated/types
      namespacedImportName: Types
      scalars:
        Int: number
        Float: number
        String: string
        Boolean: boolean
        ID: string
        CountryCode: string
  client/src/generated/graphql.ts:
    plugins:
      - add:
          content: |
            export * from "./types";
            export * from "./operations";
  schema.graphql:
    plugins:
      - schema-ast
